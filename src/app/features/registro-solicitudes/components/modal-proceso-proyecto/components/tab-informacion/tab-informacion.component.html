<!-- Banner de solo lectura -->
<div *ngIf="modoSoloLectura" class="mb-4 p-3 rounded-lg"
  [ngClass]="{
    'bg-green-50 dark:bg-green-900/20 border border-green-200 dark:border-green-800': proyectoFinalizado,
    'bg-red-50 dark:bg-red-900/20 border border-red-200 dark:border-red-800': proyectoCancelado
  }">
  <div class="flex items-center gap-2">
    <svg *ngIf="proyectoFinalizado" class="w-4 h-4 text-green-500 flex-shrink-0" fill="currentColor" viewBox="0 0 20 20">
      <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd"/>
    </svg>
    <svg *ngIf="proyectoCancelado" class="w-4 h-4 text-red-500 flex-shrink-0" fill="currentColor" viewBox="0 0 20 20">
      <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM8.707 7.293a1 1 0 00-1.414 1.414L8.586 10l-1.293 1.293a1 1 0 101.414 1.414L10 11.414l1.293 1.293a1 1 0 001.414-1.414L11.414 10l1.293-1.293a1 1 0 00-1.414-1.414L10 8.586 8.707 7.293z" clip-rule="evenodd"/>
    </svg>
    <span class="text-xs font-medium"
      [ngClass]="{'text-green-700 dark:text-green-300': proyectoFinalizado, 'text-red-700 dark:text-red-300': proyectoCancelado}">
      {{ proyectoFinalizado ? 'Proyecto completado - informacion en modo lectura' : 'Proyecto cancelado' }}
    </span>
  </div>

  <div *ngIf="proyectoCancelado && proyecto?.motivoCancelacion as motivoCancelacion" class="border-t border-red-200 dark:border-red-800 pt-3 mt-3">
    <p class="text-sm text-red-600 dark:text-red-300 leading-relaxed">{{ motivoCancelacion }}</p>
  </div>
</div>

<app-identificacion-card
  [proyecto]="proyecto"
  [proyectoInfoForm]="proyectoInfoForm"
  [responsables]="responsables"
  [modoSoloLectura]="modoSoloLectura">
</app-identificacion-card>

<app-ordenes-compra-card
  [proyectoInfoForm]="proyectoInfoForm"
  [proyectoCancelado]="proyectoCancelado"
  (abrirVistaPreviaDocumentoEvt)="abrirVistaPreviaDocumentoEvt.emit($event)">
</app-ordenes-compra-card>

<app-descripcion-card
  [proyectoInfoForm]="proyectoInfoForm"
  [modoSoloLectura]="modoSoloLectura">
</app-descripcion-card>
