<div class="mb-3 rounded-lg border border-gray-200 dark:border-gray-700 bg-white dark:bg-gray-800 overflow-hidden">
  <button
    type="button"
    (click)="toggle()"
    class="w-full px-3 py-2 flex items-center justify-between text-left hover:bg-gray-50 dark:hover:bg-gray-700/50 transition-colors"
    [attr.aria-expanded]="expandida">
    <span class="text-xs font-semibold text-gray-500 dark:text-gray-400 uppercase tracking-wide flex items-center gap-1.5">
      <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 14h6m-6 4h6M6 4h8l4 4v12a2 2 0 01-2 2H6a2 2 0 01-2-2V6a2 2 0 012-2z"/>
      </svg>
      Órdenes de compra
      <span class="px-1.5 py-0.5 rounded-full bg-amber-100 text-amber-700 dark:bg-amber-900/40 dark:text-amber-300 text-[10px]">{{ proyectoInfoForm.ordenesCompra.length || 0 }}</span>
    </span>
    <svg class="w-3.5 h-3.5 text-gray-500 dark:text-gray-300 transition-transform duration-200" [ngClass]="{ 'rotate-180': expandida }" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/>
    </svg>
  </button>

  <div class="overflow-hidden transition-all duration-300 ease-in-out" [ngClass]="expandida ? 'max-h-[1400px] opacity-100' : 'max-h-0 opacity-0'">
    <div class="p-3 pt-1">
      <ng-container *ngIf="!proyectoCancelado; else infoOrdenCompraReadonly">
        <div class="flex items-center gap-2 mb-1">
          <button type="button" (click)="agregarOrdenCompra()"
            class="flex items-center gap-0.5 px-1.5 py-0.5 text-xs text-white bg-green-500 rounded hover:bg-green-600">
            <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/>
            </svg>
          </button>
        </div>

        <div class="space-y-1.5">
          <div *ngFor="let oc of proyectoInfoForm.ordenesCompra; let i = index" class="flex items-start gap-3">
            <div class="flex-1 space-y-1.5">
              <div class="grid grid-cols-6 gap-2">
                <input type="text" [(ngModel)]="oc.numero" placeholder="Ej: OC-2026-001"
                  class="w-full px-2 py-1.5 text-sm border border-gray-300 dark:border-gray-600 rounded focus:ring-1 focus:ring-green-500 outline-none dark:bg-gray-700 dark:text-white">
                <select [(ngModel)]="oc.tipo"
                  class="w-full px-2 py-1.5 text-sm border border-gray-300 dark:border-gray-600 rounded focus:ring-1 focus:ring-green-500 outline-none bg-white dark:bg-gray-700 dark:text-white">
                  <option *ngFor="let tipo of tiposOrdenCompra" [ngValue]="tipo">{{ tipo }}</option>
                </select>
                <input type="text" [(ngModel)]="oc.numeroLicitacion" placeholder="N° de licitación (opcional)"
                  class="w-full px-2 py-1.5 text-sm border border-gray-300 dark:border-gray-600 rounded focus:ring-1 focus:ring-green-500 outline-none dark:bg-gray-700 dark:text-white">
                <input type="text" [(ngModel)]="oc.numeroSolicitud" placeholder="N° de solicitud (opcional)"
                  class="w-full px-2 py-1.5 text-sm border border-gray-300 dark:border-gray-600 rounded focus:ring-1 focus:ring-green-500 outline-none dark:bg-gray-700 dark:text-white">
                <app-date-picker
                  class="w-full"
                  [value]="oc.fecha"
                  (valueChange)="oc.fecha = $event"
                  [inputClass]="'w-full px-2 py-1.5 text-sm border border-gray-300 dark:border-gray-600 rounded focus:ring-1 focus:ring-green-500 outline-none dark:bg-gray-700 dark:text-white cursor-pointer bg-white dark:bg-gray-700'">
                </app-date-picker>
                <input type="number" [(ngModel)]="oc.total" min="0" step="0.01" placeholder="Total sin IGV"
                  (focus)="oc.total === 0 ? oc.total = undefined : null"
                  class="w-full px-2 py-1.5 text-sm border border-gray-300 dark:border-gray-600 rounded focus:ring-1 focus:ring-green-500 outline-none dark:bg-gray-700 dark:text-white">
              </div>

              <div class="flex items-start gap-2 flex-wrap" *ngIf="(oc.adjuntos || []).length > 0">
                <div class="flex flex-wrap gap-1">
                  <div *ngFor="let adjunto of (oc.adjuntos || []); let adjIndex = index"
                    class="inline-flex items-center gap-1 pl-2 pr-1 py-0.5 rounded-full border border-amber-200 dark:border-amber-700 bg-amber-50 dark:bg-amber-900/30 text-amber-700 dark:text-amber-300 max-w-full">
                    <span class="truncate text-[10px] max-w-40" [title]="adjunto.nombre">{{ adjunto.nombre }}</span>
                    <button type="button" (click)="verAdjuntoOrdenCompra(oc, adjunto)" title="Ver archivo" aria-label="Ver archivo"
                      class="inline-flex h-4 w-4 items-center justify-center rounded-full bg-green-100 text-green-700 hover:bg-green-200 dark:bg-green-900/40 dark:text-green-300">
                      <svg class="w-2.5 h-2.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
                      </svg>
                    </button>
                    <button type="button" (click)="descargarAdjuntoOrdenCompra(adjunto)" title="Descargar archivo" aria-label="Descargar archivo"
                      class="inline-flex h-4 w-4 items-center justify-center rounded-full bg-blue-100 text-blue-700 hover:bg-blue-200 dark:bg-blue-900/40 dark:text-blue-300">
                      <svg class="w-2.5 h-2.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a2 2 0 002 2h12a2 2 0 002-2v-1"/>
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v12m0 0l-4-4m4 4l4-4"/>
                      </svg>
                    </button>
                    <button type="button" (click)="eliminarAdjuntoOrdenCompra(i, adjIndex)" title="Quitar archivo" aria-label="Quitar archivo"
                      class="inline-flex h-4 w-4 items-center justify-center rounded-full bg-red-100 text-red-700 hover:bg-red-200 dark:bg-red-900/40 dark:text-red-300">
                      <svg class="w-2.5 h-2.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
                      </svg>
                    </button>
                  </div>
                </div>
              </div>
            </div>

            <div class="flex-shrink-0 h-[38px] flex items-center gap-2 self-start">
              <label class="inline-flex h-8 w-8 items-center justify-center rounded-md border border-gray-300 dark:border-gray-600 text-gray-700 dark:text-gray-200 hover:bg-gray-50 dark:hover:bg-gray-700 cursor-pointer" title="Subir archivo">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v2a2 2 0 002 2h12a2 2 0 002-2v-2M8 8l4-4m0 0l4 4m-4-4v12"/>
                </svg>
                <input type="file" class="hidden" [accept]="acceptTiposArchivo" multiple (change)="onSeleccionarAdjuntosOrdenCompra($event, i)">
              </label>

              <button type="button" (click)="eliminarOrdenCompra(i, $event)"
                class="inline-flex h-8 w-8 items-center justify-center rounded-md text-red-400 hover:text-red-600 hover:bg-red-50 dark:hover:bg-red-900/20"
                title="Eliminar orden de compra">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
                </svg>
              </button>
            </div>
          </div>
          <p *ngIf="proyectoInfoForm.ordenesCompra.length === 0" class="text-xs text-gray-400 dark:text-gray-500 italic">Sin órdenes de compra</p>
        </div>
      </ng-container>

      <ng-template #infoOrdenCompraReadonly>
        <div *ngIf="proyectoInfoForm.ordenesCompra.length > 0" class="space-y-1">
          <div *ngFor="let oc of proyectoInfoForm.ordenesCompra" class="grid grid-cols-6 gap-3 px-2 py-1.5 text-sm bg-gray-50 dark:bg-gray-700/50 rounded">
            <span class="font-medium text-gray-700 dark:text-gray-200">{{ oc.numero || '—' }}</span>
            <span class="text-gray-600 dark:text-gray-300">{{ oc.tipo || '—' }}</span>
            <span class="text-gray-600 dark:text-gray-300">{{ oc.numeroLicitacion || '—' }}</span>
            <span class="text-gray-600 dark:text-gray-300">{{ oc.numeroSolicitud || '—' }}</span>
            <span class="text-gray-500 dark:text-gray-400 text-xs">{{ oc.fecha ? (oc.fecha | date:'dd/MM/yyyy') : '—' }}</span>
            <span class="text-blue-600 dark:text-blue-400 font-semibold text-right">{{ (oc.total ?? 0) | currency:'S/ ' }}</span>
          </div>
        </div>
        <p *ngIf="proyectoInfoForm.ordenesCompra.length === 0" class="px-2 py-1.5 text-sm text-gray-400 dark:text-gray-500 bg-gray-50 dark:bg-gray-700/50 rounded">—</p>
      </ng-template>
    </div>
  </div>
</div>
