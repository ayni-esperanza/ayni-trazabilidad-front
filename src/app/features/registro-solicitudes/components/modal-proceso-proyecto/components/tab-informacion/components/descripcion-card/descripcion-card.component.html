<div class="mb-2 rounded-lg border border-gray-200 dark:border-gray-700 bg-white dark:bg-gray-800 overflow-hidden">
  <button
    type="button"
    (click)="toggle()"
    class="w-full px-3 py-2 flex items-center justify-between text-left hover:bg-gray-50 dark:hover:bg-gray-700/50 transition-colors"
    [attr.aria-expanded]="expandida">
    <span class="text-xs font-semibold text-gray-500 dark:text-gray-400 uppercase tracking-wide flex items-center gap-1.5">
      <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h7"/>
      </svg>
      Descripción
    </span>
    <svg class="w-3.5 h-3.5 text-gray-500 dark:text-gray-300 transition-transform duration-200" [ngClass]="{ 'rotate-180': expandida }" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/>
    </svg>
  </button>

  <div class="overflow-hidden transition-all duration-300 ease-in-out" [ngClass]="expandida ? 'max-h-[900px] opacity-100' : 'max-h-0 opacity-0'">
    <div class="p-3 pt-1">
      <ng-container *ngIf="!modoSoloLectura; else infoDescripcionReadonly">
        @if (isBrowser && Editor) {
          <ckeditor
            [(ngModel)]="proyectoInfoForm.descripcion"
            [editor]="Editor"
            [config]="ckeditorConfig"
            class="ckeditor-host">
          </ckeditor>
        } @else {
          <textarea [(ngModel)]="proyectoInfoForm.descripcion" rows="4" placeholder="Descripción del proyecto..."
            class="w-full px-2 py-1.5 text-sm border border-gray-300 dark:border-gray-600 rounded focus:ring-1 focus:ring-green-500 outline-none dark:bg-gray-700 dark:text-white resize-none"></textarea>
        }
      </ng-container>
      <ng-template #infoDescripcionReadonly>
        <div class="linkified-content text-sm text-gray-600 dark:text-gray-300 prose prose-sm dark:prose-invert max-w-none bg-gray-50 dark:bg-gray-700/30 p-3 rounded-lg min-h-[60px]"
          [innerHTML]="(proyectoInfoForm.descripcion || '<em>Sin descripción</em>') | linkify">
        </div>
      </ng-template>
    </div>
  </div>
</div>
