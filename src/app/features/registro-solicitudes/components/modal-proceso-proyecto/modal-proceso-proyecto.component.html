<!-- Confeti decorativo -->
<div *ngIf="mostrarConfeti" class="confetti-container">
  <div *ngFor="let c of confetis" 
    class="confetti"
    [ngClass]="{
      'confetti-circle': c.tipo === 'circle',
      'confetti-square': c.tipo === 'square',
      'confetti-triangle': c.tipo === 'triangle',
      'confetti-star': c.tipo === 'star',
      'confetti-ribbon': c.tipo === 'ribbon',
      'confetti-wave-1': c.id % 3 === 0,
      'confetti-wave-2': c.id % 3 === 1,
      'confetti-wave-3': c.id % 3 === 2,
      'confetti-shimmer': c.id % 5 === 0
    }"
    [ngStyle]="{
      'left': c.left + '%',
      'background-color': c.tipo !== 'triangle' ? c.color : 'transparent',
      'border-bottom-color': c.tipo === 'triangle' ? c.color : 'transparent',
      'animation-delay': c.delay + 's',
      'animation-duration': c.duration + 's'
    }">
  </div>
</div>

<div *ngIf="visible" class="fixed inset-0 z-50 flex items-center justify-center bg-black/50"
  [appModalDismiss]="visible && !mostrarModalCancelacion && !mostrarConfirmacionCancelar" (dismissed)="onCerrar()">
  <div data-modal-content class="bg-white dark:bg-gray-800 rounded-lg shadow-xl w-full max-w-3xl mx-4 max-h-[90vh] flex flex-col">
    <!-- Header -->
    <div class="bg-green-500 px-4 py-3 flex items-center justify-between rounded-t-lg">
      <h2 class="text-lg font-semibold text-white">Flujo del Proyecto</h2>
      <button (click)="onCerrar()" class="text-white hover:text-gray-200">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
        </svg>
      </button>
    </div>

    <!-- Navegación Tabs -->
    <div class="flex border-b border-gray-200 dark:border-gray-700 bg-gray-50 dark:bg-gray-800/50">
      <button (click)="cambiarTab('proceso')" 
        class="flex-1 px-4 py-2.5 text-sm font-medium transition-colors flex items-center justify-center gap-2"
        [ngClass]="{
          'text-green-600 border-b-2 border-green-500 bg-white dark:bg-gray-800': tabActiva === 'proceso',
          'text-gray-500 hover:text-gray-700 dark:text-gray-400 dark:hover:text-gray-200': tabActiva !== 'proceso'
        }">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-3 7h3m-3 4h3m-6-4h.01M9 16h.01"/>
        </svg>
        Flujo de proyecto
      </button>      <button (click)="cambiarTab('informacion')" 
        class="flex-1 px-4 py-2.5 text-sm font-medium transition-colors flex items-center justify-center gap-2"
        [ngClass]="{
          'text-green-600 border-b-2 border-green-500 bg-white dark:bg-gray-800': tabActiva === 'informacion',
          'text-gray-500 hover:text-gray-700 dark:text-gray-400 dark:hover:text-gray-200': tabActiva !== 'informacion'
        }">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
        </svg>
        Información
      </button>      <button (click)="cambiarTab('costos')" 
        class="flex-1 px-4 py-2.5 text-sm font-medium transition-colors flex items-center justify-center gap-2"
        [ngClass]="{
          'text-green-600 border-b-2 border-green-500 bg-white dark:bg-gray-800': tabActiva === 'costos',
          'text-gray-500 hover:text-gray-700 dark:text-gray-400 dark:hover:text-gray-200': tabActiva !== 'costos'
        }">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
        </svg>
        Costos
        <span *ngIf="totalCostosGeneral > 0" class="text-xs bg-green-100 dark:bg-green-900/40 text-green-700 dark:text-green-300 px-1.5 py-0.5 rounded-full">
          S/ {{ totalCostosGeneral | number:'1.0-0' }}
        </span>
      </button>
    </div>

    <!-- Body -->
    <div class="p-4 overflow-y-auto flex-1">

      <!-- ========== TAB PROCESO ========== -->
      <app-tab-proceso *ngIf="tabActiva === 'proceso'"
        [proyecto]="proyecto"
        [etapas]="etapas"
        [etapaSeleccionada]="etapaSeleccionada"
        [etapaForm]="etapaForm"
        [responsables]="responsables"
        [modoSoloLectura]="modoSoloLectura"
        [proyectoFinalizado]="proyectoFinalizado"
        [proyectoCancelado]="proyectoCancelado"
        [todasEtapasCompletadas]="todasEtapasCompletadas"
        [intentoFinalizarEtapa]="intentoFinalizarEtapa"
        [erroresEtapa]="erroresEtapa"
        [flujoNodos]="flujoNodos"
        (seleccionarEtapaEvt)="seleccionarEtapa($event)"
        (abrirActividadEvt)="abrirModalActividad()">
      </app-tab-proceso>

      <!-- ========== TAB INFORMACIÓN ========== -->
      <app-tab-informacion *ngIf="tabActiva === 'informacion'"
        [proyecto]="proyecto"
        [proyectoInfoForm]="proyectoInfoForm"
        [responsables]="responsables"
        [procesos]="procesos"
        [etapas]="etapas"
        [modoSoloLectura]="modoSoloLectura"
        [proyectoFinalizado]="proyectoFinalizado"
        [proyectoCancelado]="proyectoCancelado">
      </app-tab-informacion>

      <!-- ========== TAB COSTOS ========== -->
      <app-tab-costos *ngIf="tabActiva === 'costos'"
        [materiales]="materiales"
        [manoObra]="manoObra"
        [tablasCostosExtras]="tablasCostosExtras"
        [modoSoloLectura]="modoSoloLectura">
      </app-tab-costos>

    </div>

        <!-- Footer -->
    <div class="px-4 py-3 border-t border-gray-200 dark:border-gray-700 flex justify-between">
      <button *ngIf="!proyectoFinalizado && !proyectoCancelado && tabActiva === 'proceso'" (click)="onCancelarProyecto()" class="px-3 py-1.5 text-sm text-white bg-red-500 rounded hover:bg-red-600">
        Cancelar Proyecto
      </button>
      <div *ngIf="proyectoFinalizado" class="flex items-center gap-2">
        <svg class="w-5 h-5 text-green-500" fill="currentColor" viewBox="0 0 20 20">
          <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd"/>
        </svg>
        <span class="text-sm font-medium text-green-600 dark:text-green-400">Proyecto Completado</span>
      </div>
      <div *ngIf="proyectoCancelado" class="flex items-center gap-2">
        <svg class="w-5 h-5 text-red-500" fill="currentColor" viewBox="0 0 20 20">
          <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM8.707 7.293a1 1 0 00-1.414 1.414L8.586 10l-1.293 1.293a1 1 0 101.414 1.414L10 11.414l1.293 1.293a1 1 0 001.414-1.414L11.414 10l1.293-1.293a1 1 0 00-1.414-1.414L10 8.586 8.707 7.293z" clip-rule="evenodd"/>
        </svg>
        <span class="text-sm font-medium text-red-600 dark:text-red-400">Proyecto Cancelado</span>
      </div>
      <div class="flex gap-2" [ngClass]="{'ml-auto': proyectoFinalizado || proyectoCancelado || tabActiva === 'costos' || tabActiva === 'informacion'}">
        <button (click)="onCerrar()" class="px-3 py-1.5 text-sm text-gray-700 dark:text-gray-300 border border-gray-300 dark:border-gray-600 rounded hover:bg-gray-50 dark:hover:bg-gray-700">
          {{ (proyectoFinalizado || proyectoCancelado) ? 'Cerrar' : 'Cancelar' }}
        </button>
        <!-- Botón Guardar Cambios (tab información) -->
        <button *ngIf="tabActiva === 'informacion' && !modoSoloLectura" (click)="guardarInfoProyecto()"
          class="px-3 py-1.5 text-sm text-white bg-green-500 rounded hover:bg-green-600 flex items-center gap-1">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/>
          </svg>
          Guardar Cambios
        </button>
        <!-- Botón Finalizar Etapa (cuando hay etapas pendientes) -->
        <button *ngIf="!todasEtapasCompletadas && !proyectoFinalizado && !proyectoCancelado && tabActiva === 'proceso'" (click)="onFinalizarEtapa()" 
          class="px-3 py-1.5 text-sm text-white bg-green-500 rounded hover:bg-green-600">
          Finalizar Etapa
        </button>
        <!-- Botón Finalizar Proyecto (cuando todas las etapas están completadas) -->
        <button *ngIf="todasEtapasCompletadas && !proyectoFinalizado && !proyectoCancelado && tabActiva === 'proceso'" (click)="onFinalizarProyecto()" 
          class="px-3 py-1.5 text-sm text-white bg-blue-600 rounded hover:bg-blue-700 flex items-center gap-1">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/>
          </svg>
          Finalizar Proyecto
        </button>
      </div>
    </div>
  </div>
</div>

<!-- Modal de Cancelación -->
@if (mostrarModalCancelacion) {
  <div class="fixed inset-0 z-[60] flex items-center justify-center bg-black/80">
    <div class="bg-white dark:bg-gray-800 rounded-lg shadow-xl w-full max-w-md mx-4">
      <div class="bg-red-500 px-4 py-3 flex items-center justify-between rounded-t-lg">
        <h2 class="text-lg font-semibold text-white">Cancelar Proyecto</h2>
        <button (click)="cerrarModalCancelacion()" class="text-white hover:text-gray-200">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
          </svg>
        </button>
      </div>
      <div class="p-4">
        <p class="text-sm text-gray-600 dark:text-gray-300 mb-3">
          ¿Está seguro que desea cancelar el proyecto <strong>{{ proyecto?.nombreProyecto }}</strong>?
          Por favor, ingrese el motivo de la cancelación:
        </p>
        <textarea [(ngModel)]="motivoCancelacion" rows="4" placeholder="Ingrese el motivo de la cancelación..."
          class="w-full px-3 py-2 text-sm border border-gray-300 dark:border-gray-600 rounded-lg focus:ring-2 focus:ring-red-500 focus:border-red-500 outline-none dark:bg-gray-700 dark:text-white resize-none"></textarea>
      </div>
      <div class="px-4 py-3 border-t border-gray-200 dark:border-gray-700 flex justify-end gap-2">
        <button (click)="cerrarModalCancelacion()" class="px-3 py-1.5 text-sm text-gray-700 dark:text-gray-300 border border-gray-300 dark:border-gray-600 rounded hover:bg-gray-50 dark:hover:bg-gray-700">
          No, volver
        </button>
        <button (click)="onSolicitarConfirmacionCancelar()" [disabled]="!motivoCancelacion.trim()"
          [class.opacity-50]="!motivoCancelacion.trim()" [class.cursor-not-allowed]="!motivoCancelacion.trim()"
          class="px-3 py-1.5 text-sm text-white bg-red-500 rounded hover:bg-red-600">
          Continuar
        </button>
      </div>
    </div>
  </div>
}

<!-- Modal de confirmación de cancelación (sobremodal) -->
<app-confirm-delete-modal
  [visible]="mostrarConfirmacionCancelar"
  [loading]="cargandoCancelacion"
  [config]="configCancelarModal"
  (confirmar)="confirmarCancelacion()"
  (cancelar)="onCancelarConfirmacionCancelar()">
</app-confirm-delete-modal>

<!-- Modal de agregar actividad -->
<app-tarea-form-modal
  [visible]="mostrarModalActividad"
  [tarea]="actividadParaEditar"
  [modoEdicion]="actividadParaEditar !== null"
  [proyectoPreseleccionado]="proyecto ? { id: proyecto.id.toString(), nombre: proyecto.nombreProyecto } : null"
  [proyectoFijo]="true"
  [etapaPreseleccionada]="etapaSeleccionada ? { id: etapaSeleccionada.nombre, nombre: etapaSeleccionada.nombre } : null"
  [etapaFija]="true"
  (cerrar)="onCerrarModalActividad()"
  (guardar)="onGuardarActividad($event)">
</app-tarea-form-modal>
