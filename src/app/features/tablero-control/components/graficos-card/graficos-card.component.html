<div class="chart-card bg-white dark:bg-gray-800 rounded-[1.25rem] shadow-sm p-3 md:p-4 flex-1 flex flex-col overflow-hidden min-h-0 border border-slate-200/70 dark:border-slate-700/70">
  <div class="flex flex-col gap-3 sm:flex-row sm:items-start sm:justify-between flex-shrink-0">
    <div class="min-w-0">
      <h3 class="mt-2 text-sm md:text-base font-semibold text-gray-800 dark:text-white truncate">{{ tituloGrafico }}</h3>
    </div>

    <div class="inline-flex w-full sm:w-auto rounded-2xl border border-slate-200 bg-slate-50/90 p-1 dark:border-slate-700 dark:bg-slate-900/60">
      <button
        (click)="cambiarTipoGrafico('barras')"
        [class]="tipoGrafico === 'barras' ? 'flex-1 sm:flex-none rounded-xl bg-white px-3 py-2 text-emerald-700 shadow-sm dark:bg-slate-800 dark:text-emerald-300' : 'flex-1 sm:flex-none rounded-xl px-3 py-2 text-slate-500 hover:text-slate-900 dark:text-slate-400 dark:hover:text-white'"
        title="Gr�fico de barras"
        aria-label="Gr�fico de barras">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z" />
        </svg>
      </button>
      <button
        (click)="cambiarTipoGrafico('linea')"
        [class]="tipoGrafico === 'linea' ? 'flex-1 sm:flex-none rounded-xl bg-white px-3 py-2 text-emerald-700 shadow-sm dark:bg-slate-800 dark:text-emerald-300' : 'flex-1 sm:flex-none rounded-xl px-3 py-2 text-slate-500 hover:text-slate-900 dark:text-slate-400 dark:hover:text-white'"
        title="Gr�fico de l�nea"
        aria-label="Gr�fico de l�nea">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 12l3-3 3 3 4-4M8 21l4-4 4 4M3 4h18M4 4h16v12a1 1 0 01-1 1H5a1 1 0 01-1-1V4z" />
        </svg>
      </button>
      <button
        (click)="cambiarTipoGrafico('pie')"
        [class]="tipoGrafico === 'pie' ? 'flex-1 sm:flex-none rounded-xl bg-white px-3 py-2 text-emerald-700 shadow-sm dark:bg-slate-800 dark:text-emerald-300' : 'flex-1 sm:flex-none rounded-xl px-3 py-2 text-slate-500 hover:text-slate-900 dark:text-slate-400 dark:hover:text-white'"
        title="Gr�fico circular"
        aria-label="Gr�fico circular">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 3.055A9.001 9.001 0 1020.945 13H11V3.055z" />
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.488 9H15V3.512A9.025 9.025 0 0120.488 9z" />
        </svg>
      </button>
    </div>
  </div>

  <div class="chart-frame flex-1 mt-3 min-h-0 rounded-[1.15rem] border border-slate-200/80 bg-gradient-to-br from-slate-50 via-white to-emerald-50/40 p-2 sm:p-3 dark:border-slate-700/80 dark:from-slate-900 dark:via-slate-900 dark:to-emerald-950/30">
    @if (graficosListos) {
      <div class="chart-stage h-full min-h-[260px] md:min-h-0">
        @if (tipoGrafico === 'barras') {
          <ngx-charts-bar-vertical
            class="chart-widget"
            [results]="datosGrafico"
            [scheme]="colorScheme"
            [xAxis]="true"
            [yAxis]="true"
            [legend]="false"
            [showXAxisLabel]="false"
            [showYAxisLabel]="false"
            [gradient]="false"
            [animations]="false"
            [barPadding]="8"
            [roundEdges]="true"
            [customColors]="customColors"
            (select)="onSelectGrafico($event)">
          </ngx-charts-bar-vertical>
        }
        @else if (tipoGrafico === 'linea') {
          <ngx-charts-line-chart
            class="chart-widget"
            [results]="[{name: tituloGrafico, series: datosGrafico}]"
            [scheme]="colorScheme"
            [xAxis]="true"
            [yAxis]="true"
            [legend]="false"
            [showXAxisLabel]="false"
            [showYAxisLabel]="false"
            [autoScale]="true"
            [animations]="false"
            [customColors]="customColors"
            (select)="onSelectGrafico($event)">
          </ngx-charts-line-chart>
        }
        @else {
          <ngx-charts-pie-chart
            class="chart-widget"
            [results]="datosPieChart"
            [scheme]="colorScheme"
            [legend]="false"
            [labels]="true"
            [doughnut]="true"
            [arcWidth]="0.35"
            [gradient]="false"
            [animations]="false"
            [tooltipDisabled]="false"
            (select)="onSelectGrafico($event)">
          </ngx-charts-pie-chart>
        }
      </div>
    } @else {
      <div class="flex h-full min-h-[260px] items-center justify-center md:min-h-0">
        <div class="animate-spin rounded-full h-8 w-8 border-b-2 border-green-500"></div>
      </div>
    }
  </div>
</div>
