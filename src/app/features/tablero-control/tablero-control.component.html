<div class="p-4 bg-gray-50 dark:bg-gray-900 h-screen flex flex-col overflow-hidden">
  
  <!-- Header con título y fecha -->
  <div class="mb-4 flex-shrink-0">
    <h1 class="text-xl font-bold text-gray-800 dark:text-white">Tablero de Control</h1>
    <p class="text-xs text-gray-500 dark:text-gray-400">{{ fechaActual | date:'d \'de\' MMMM \'del\' yyyy':'':'es' }}</p>
  </div>
  
  <!-- Layout principal - 2 columnas -->
  <div class="grid grid-cols-1 lg:grid-cols-12 gap-3 flex-1 overflow-hidden">
    
    <!-- Columna izquierda - Métricas y Gráfico -->
    <div class="lg:col-span-4 flex flex-col gap-3 overflow-auto">
      
      <!-- Componente de Métricas -->
      <app-metricas-card
        [proyectosFinalizados]="proyectosFinalizados"
        [proyectosActivos]="proyectosActivos"
        [gastosMes]="gastosMes"
        [gastosHoy]="gastosHoy"
        [gastosAyer]="gastosAyer"
        [metricaSeleccionada]="metricaSeleccionada"
        (metricaSeleccionadaChange)="seleccionarMetrica($event)">
      </app-metricas-card>
      
      <!-- Componente de Gráficos -->
      <app-graficos-card
        [tituloGrafico]="tituloGrafico"
        [tipoGrafico]="tipoGrafico"
        [datosGrafico]="datosGraficoActual"
        [datosPieChart]="datosPieChart"
        [colorScheme]="colorSchemeActual"
        [customColors]="customColors"
        [graficosListos]="graficosListos"
        (tipoGraficoChange)="cambiarTipoGrafico($event)"
        (selectGrafico)="onSelectGrafico($event)">
      </app-graficos-card>
    </div>
    
    <!-- Columna derecha - Contenedor flex para ambas tablas -->
    <div class="lg:col-span-8 flex flex-col gap-3 overflow-hidden">
    
    <!-- Componente Tabla de Proyectos -->
    <app-proyectos-tabla-card
      [proyectosFiltrados]="proyectosEnCursoFiltrados"
      [empresas]="empresasDisponibles"
      [empresaSeleccionada]="empresaSeleccionada"
      [metricaSeleccionada]="metricaSeleccionada"
      [mesSeleccionado]="mesSeleccionado"
      [proyectoSeleccionado]="proyectoSeleccionado"
      [tablaVisible]="tablaProyectosVisible"
      (toggleTabla)="toggleTablaProyectos()"
      (limpiarFiltros)="limpiarFiltros()"
      (selectProyecto)="onSelectProyecto($event)"
      (empresaSeleccionadaChange)="onEmpresaChange($event)">
    </app-proyectos-tabla-card>
    
    <!-- Componente Tabla de Encargados/Gastos -->
    <app-encargados-tabla-card
      [metricaSeleccionada]="metricaSeleccionada"
      [tareasFiltradas]="tareasFiltradas"
      [gastosFiltrados]="gastosFiltrados"
      [proyectoSeleccionado]="proyectoSeleccionado"
      [categoriaSeleccionada]="categoriaSeleccionada"
      [tablaVisible]="tablaDetalleVisible"
      [modoVisualizacion]="modoVisualizacionTareas"
      [totalGastosFiltrados]="totalGastosFiltrados"
      [totalMateriales]="getTotalPorCategoria('Materiales')"
      [totalManoObra]="getTotalPorCategoria('Mano de Obra')"
      [totalOtrosCostos]="getTotalPorCategoria('Otros Costos')"
      (toggleTabla)="toggleTablaDetalle()"
      (cambiarModo)="cambiarModoVisualizacionTareas($event)"
      (seleccionarCategoria)="seleccionarCategoria($event)">
    </app-encargados-tabla-card>
    </div>
  </div>
</div>
