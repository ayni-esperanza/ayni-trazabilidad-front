@if (visible) {
  <div class="fixed inset-0 z-50">
    <div
      class="absolute inset-0 flex items-center justify-center p-4"
      appModalDismiss
      [enabled]="visible && !loading"
      (dismissed)="onCancelar()">
      <!-- Backdrop -->
      <div class="absolute inset-0 bg-black/40"></div>

      <div
        data-modal-content
        class="relative z-10 w-full max-w-md rounded-xl bg-white dark:bg-gray-900 shadow-xl overflow-hidden">
        
        <!-- Header -->
        <div class="flex items-center justify-between px-5 py-3 bg-red-600 text-white">
          <div class="text-sm font-semibold">
            {{ titulo }}
          </div>

          <button
            type="button"
            class="p-2 rounded-lg hover:bg-white/10 disabled:opacity-50"
            [disabled]="loading"
            (click)="onCancelar()"
            aria-label="Cerrar">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
            </svg>
          </button>
        </div>

        <!-- Body -->
        <div class="p-5">
          <!-- Icono de advertencia -->
          <div class="flex justify-center mb-4">
            <div class="flex items-center justify-center w-14 h-14 bg-red-100 rounded-full dark:bg-red-900/30">
              <svg class="w-7 h-7 text-red-600 dark:text-red-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" 
                  d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" />
              </svg>
            </div>
          </div>

          <!-- Mensaje -->
          <p class="text-center text-gray-700 dark:text-gray-300">
            {{ mensaje }}
          </p>

          <p class="mt-2 text-center text-sm text-gray-500 dark:text-gray-400">
            Esta acción no se puede deshacer.
          </p>
        </div>

        <!-- Footer -->
        <div class="flex justify-end gap-3 px-5 py-4 bg-gray-50 dark:bg-gray-800/50">
          <button
            type="button"
            class="px-4 py-2 text-sm font-medium text-gray-700 bg-white border border-gray-300 rounded-lg hover:bg-gray-50 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-gray-500 disabled:opacity-50 dark:bg-gray-700 dark:text-gray-300 dark:border-gray-600 dark:hover:bg-gray-600"
            [disabled]="loading"
            (click)="onCancelar()">
            {{ textoCancelar }}
          </button>

          <button
            type="button"
            class="inline-flex items-center px-4 py-2 text-sm font-medium text-white bg-red-600 border border-transparent rounded-lg hover:bg-red-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-red-500 disabled:opacity-50"
            [disabled]="loading"
            (click)="onConfirmar()">
            @if (loading) {
              <svg class="w-4 h-4 mr-2 animate-spin" fill="none" viewBox="0 0 24 24">
                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
              </svg>
              Eliminando...
            } @else {
              <svg class="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" 
                  d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
              </svg>
              {{ textoConfirmar }}
            }
          </button>
        </div>
      </div>
    </div>
  </div>
}
