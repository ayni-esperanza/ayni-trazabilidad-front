@if (visible) {
  <div class="fixed inset-0 z-[9999] animate-overlay-in">
    <div
      class="absolute inset-0 flex items-center justify-center p-4"
      appModalDismiss
      [enabled]="visible && !loading"
      (dismissed)="onCancelar()">
      <div class="absolute inset-0 bg-black/60"></div>

      <div
        data-modal-content
        class="relative z-10 w-full max-w-md rounded-xl bg-white dark:bg-gray-900 shadow-2xl overflow-hidden animate-modal-in"
        style="box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);">

        <div class="flex items-center justify-between px-5 py-3 bg-green-600 text-white">
          <div class="text-sm font-semibold">{{ titulo }}</div>

          <button
            type="button"
            class="p-2 rounded-lg hover:bg-white/10 disabled:opacity-50"
            [disabled]="loading"
            (click)="onCancelar()"
            aria-label="Cerrar">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
            </svg>
          </button>
        </div>

        <div class="p-5">
          <div class="flex justify-center mb-4">
            <div class="flex items-center justify-center w-14 h-14 bg-green-100 rounded-full dark:bg-green-900/30">
              <svg class="w-7 h-7 text-green-600 dark:text-green-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7" />
              </svg>
            </div>
          </div>

          <p class="text-center text-gray-700 dark:text-gray-300 mb-3">
            {{ mensaje }}
          </p>

          <div class="p-3 bg-green-50 dark:bg-green-900/20 border border-green-200 dark:border-green-800 rounded-lg">
            <div class="flex items-start gap-2">
              <svg class="w-5 h-5 text-green-600 dark:text-green-400 flex-shrink-0 mt-0.5" fill="currentColor" viewBox="0 0 20 20">
                <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd" />
              </svg>
              <p class="text-xs text-green-700 dark:text-green-300">
                Al finalizar, el proyecto se marcara como completado y quedara en modo de solo lectura.
              </p>
            </div>
          </div>
        </div>

        <div class="flex justify-end gap-3 px-5 py-4 bg-gray-50 dark:bg-gray-800/50">
          <button
            type="button"
            class="px-4 py-2 text-sm font-medium text-gray-700 bg-white border border-gray-300 rounded-lg hover:bg-gray-50 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-gray-500 disabled:opacity-50 dark:bg-gray-700 dark:text-gray-300 dark:border-gray-600 dark:hover:bg-gray-600"
            [disabled]="loading"
            (click)="onCancelar()">
            {{ textoCancelar }}
          </button>

          <button
            type="button"
            class="inline-flex items-center px-4 py-2 text-sm font-medium text-white bg-green-600 border border-transparent rounded-lg hover:bg-green-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-green-500 disabled:opacity-50"
            [disabled]="loading"
            (click)="onConfirmar()">
            @if (loading) {
              <svg class="w-4 h-4 mr-2 animate-spin" fill="none" viewBox="0 0 24 24">
                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
              </svg>
              Finalizando...
            } @else {
              <svg class="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7" />
              </svg>
              {{ textoConfirmar }}
            }
          </button>
        </div>
      </div>
    </div>
  </div>
}
