@if (visible) {
  <div class="flex flex-col gap-3 p-3 bg-red-50 dark:bg-red-900/10 border border-red-200 dark:border-red-800 rounded-lg">
    <!-- Mensaje de advertencia -->
    <div class="flex items-start gap-2">
      <svg class="w-5 h-5 text-red-600 dark:text-red-400 flex-shrink-0 mt-0.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" 
          d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" />
      </svg>
      <div class="flex-1">
        <p class="text-sm font-medium text-red-800 dark:text-red-300">¿Está seguro de eliminar?</p>
        <p class="text-xs text-red-600 dark:text-red-400 mt-1">Esta acción no se puede deshacer.</p>
      </div>
    </div>

    <!-- Checkbox de confirmación -->
    <label class="flex items-start gap-2 cursor-pointer group">
      <input 
        type="checkbox" 
        [(ngModel)]="confirmado"
        [disabled]="disabled"
        class="mt-0.5 w-4 h-4 text-red-600 bg-white dark:bg-gray-800 border-gray-300 dark:border-gray-600 rounded focus:ring-2 focus:ring-red-500 disabled:opacity-50 disabled:cursor-not-allowed">
      <span class="text-xs text-gray-700 dark:text-gray-300 group-hover:text-gray-900 dark:group-hover:text-gray-100 select-none">
        {{ textoConfirmacion }}
      </span>
    </label>

    <!-- Botón de eliminar -->
    <button
      type="button"
      (click)="onConfirmar()"
      [disabled]="!puedeEliminar"
      class="w-full px-4 py-2 text-sm font-medium text-white bg-red-600 rounded-lg hover:bg-red-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-red-500 disabled:opacity-50 disabled:cursor-not-allowed disabled:hover:bg-red-600 transition-colors flex items-center justify-center gap-2">
      <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" 
          d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
      </svg>
      {{ textoBoton }}
    </button>
  </div>
}
