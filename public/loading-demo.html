<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AYNI - Loading Animation</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 3rem;
      background: linear-gradient(135deg, #f5f7fa 0%, #e4e9f0 100%);
      padding: 2rem;
    }

    h1 {
      color: #333;
      font-weight: 300;
      letter-spacing: 0.1em;
    }

    .demo-section {
      display: flex;
      flex-wrap: wrap;
      gap: 3rem;
      justify-content: center;
      align-items: flex-end;
    }

    .demo-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1rem;
    }

    .demo-item label {
      color: #666;
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }

    /* ============================================ */
    /* LOADING COMPONENT STYLES */
    /* ============================================ */

    .loading-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1rem;
    }

    /* Tamaños */
    .size-sm .logo-wrapper { width: 100px; }
    .size-md .logo-wrapper { width: 180px; }
    .size-lg .logo-wrapper { width: 280px; }

    /* Logo wrapper */
    .logo-wrapper {
      position: relative;
      overflow: hidden;
    }

    .logo-svg {
      width: 100%;
      height: auto;
    }

    /* Animación trazo (stroke draw) */
    .logo-path {
      fill: transparent;
      stroke: #009D45;
      stroke-width: 1.8;
      stroke-linecap: round;
      stroke-linejoin: round;
      stroke-dasharray: 1800;
      stroke-dashoffset: 1800;
      animation: logoStrokeDraw 2.4s ease-in-out infinite;
    }

    @keyframes logoStrokeDraw {
      0% {
        stroke-dashoffset: 1800;
        opacity: 0.2;
      }
      25% {
        opacity: 1;
      }
      75% {
        stroke-dashoffset: 0;
        opacity: 1;
      }
      100% {
        stroke-dashoffset: 0;
        opacity: 0.3;
      }
    }

    /* Efecto de brillo que pasa por encima */
    .shine-effect {
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(
        90deg,
        transparent 0%,
        rgba(255, 255, 255, 0.4) 50%,
        transparent 100%
      );
      animation: shine 2s ease-in-out infinite;
    }

    @keyframes shine {
      0% { left: -100%; }
      50%, 100% { left: 100%; }
    }

    /* Texto de carga */
    .loading-text {
      color: #009D45;
      font-size: 0.875rem;
      font-weight: 500;
      letter-spacing: 0.1em;
      animation: textPulse 1.5s ease-in-out infinite;
      margin: 0;
    }

    @keyframes textPulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    /* Puntos animados */
    .loading-text::after {
      content: '';
      animation: dots 1.5s steps(4, end) infinite;
    }

    @keyframes dots {
      0% { content: ''; }
      25% { content: '.'; }
      50% { content: '..'; }
      75% { content: '...'; }
      100% { content: ''; }
    }

    /* Tamaños de texto */
    .size-sm .loading-text { font-size: 0.75rem; }
    .size-md .loading-text { font-size: 0.875rem; }
    .size-lg .loading-text { font-size: 1rem; }

    /* ============================================ */
    /* VARIANTE OSCURA */
    /* ============================================ */

    .dark-bg {
      background: #1a1a2e;
      padding: 2rem 3rem;
      border-radius: 1rem;
    }

    .dark-bg .loading-text {
      color: #00d65b;
    }

    /* ============================================ */
    /* VARIANTE SPINNER 3D */
    /* ============================================ */

    .spinner-variant .logo-svg {
      animation: spin 3s linear infinite;
    }

    @keyframes spin {
      0% { transform: rotateY(0deg); }
      100% { transform: rotateY(360deg); }
    }

    .spinner-variant .shine-effect {
      display: none;
    }
  </style>
</head>
