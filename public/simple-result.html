<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vectorización - Color #009D45</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            background: #f5f5f5;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            padding: 30px;
            border-radius: 10px;
        }
        h1 {
            text-align: center;
            color: #009D45;
        }
        .comparison {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            margin: 30px 0;
        }
        .version {
            text-align: center;
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 20px;
        }
        .version img {
            width: 200px;
            height: 200px;
            border: 1px solid #eee;
            background: white;
        }
        .color-sample {
            display: inline-block;
            width: 20px;
            height: 20px;
            background: #009D45;
            border-radius: 4px;
            vertical-align: middle;
            margin-right: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Vectorización Simple</h1>
        
        <p><strong>Color:</strong> <span class="color-sample"></span> #009D45</p>

        <div class="comparison">
            <div class="version">
                <h3>Original</h3>
                <img src="aniayni-original.png" alt="Original">
                <p>Con dientes de sierra</p>
            </div>

            <div class="version">
                <h3>Suavizado</h3>
                <img src="aniayni-smooth.png" alt="Suavizado">
                <p>Sin dientes de sierra</p>
            </div>
        </div>

        <div class="comparison">
            <div class="version">
                <h3>SVG Original</h3>
                <img src="aniayni-original.svg" alt="SVG Original">
            </div>

            <div class="version">
                <h3>SVG Suavizado</h3>
                <img src="aniayni-smooth.svg" alt="SVG Suavizado">
            </div>
        </div>

    </div>
</body>
</html>
