<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AYNI - Fill letra por letra</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --ayni-green: #009d45;
      --bg-a: #f2f7f3;
      --bg-b: #dfe9e1;
      --ink: #1f2937;
    }

    body {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 2rem;
      font-family: "Segoe UI", system-ui, sans-serif;
      background:
        radial-gradient(circle at 85% 10%, rgba(255, 255, 255, 0.9) 0%, transparent 35%),
        radial-gradient(circle at 10% 90%, rgba(0, 157, 69, 0.08) 0%, transparent 40%),
        linear-gradient(150deg, var(--bg-a) 0%, var(--bg-b) 100%);
    }

    .panel {
      width: min(820px, 100%);
      border-radius: 24px;
      border: 1px solid rgba(0, 157, 69, 0.16);
      padding: clamp(1.2rem, 2.8vw, 2rem);
      background: rgba(255, 255, 255, 0.78);
      backdrop-filter: blur(8px);
      box-shadow: 0 22px 46px rgba(0, 0, 0, 0.08);
      text-align: center;
    }

    h1 {
      color: var(--ink);
      font-size: clamp(1rem, 2vw, 1.2rem);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 0.6rem;
    }

    .subtitle {
      color: #4b5563;
      font-size: 0.9rem;
      margin-bottom: 1.4rem;
    }

    .logo-wrap {
      width: min(460px, 100%);
      margin: 0 auto;
    }

    .logo-svg {
      width: 100%;
      height: auto;
      filter: drop-shadow(0 10px 12px rgba(0, 100, 45, 0.15));
    }

    .ghost {
      fill: var(--ayni-green);
      opacity: 0.1;
    }

    .ghost-frame {
      fill: var(--ayni-green);
      opacity: 0.1;
    }

    .fill {
      fill: var(--ayni-green);
      opacity: 1;
    }

    .reveal {
      transform-box: fill-box;
      transform-origin: left center;
      transform: scaleX(0);
      animation: fillStrokeLike 2.8s cubic-bezier(0.65, 0, 0.35, 1) infinite;
    }

    .frame .reveal { animation-delay: 0s; }
    .letter-a .reveal { animation-delay: 0.32s; }
    .letter-y .reveal { animation-delay: 0.66s; }
    .letter-n .reveal { animation-delay: 1s; }
    .letter-i .reveal { animation-delay: 1.34s; }

    .loading {
      margin-top: 1rem;
      color: var(--ayni-green);
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      font-size: 0.82rem;
      animation: pulse 1.4s ease-in-out infinite;
    }

    .loading::after {
      content: "";
      animation: dots 1.4s steps(4, end) infinite;
    }

    @keyframes fillStrokeLike {
      0% {
        transform: scaleX(0);
        opacity: 0;
      }
      16% {
        opacity: 1;
      }
      38% {
        transform: scaleX(1);
        opacity: 1;
      }
      100% {
        transform: scaleX(1);
        opacity: 1;
      }
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.45; }
    }

    @keyframes dots {
      0% { content: ""; }
      25% { content: "."; }
      50% { content: ".."; }
      75% { content: "..."; }
      100% { content: ""; }
    }
  </style>
</head>
